# Default values for convo-core-chat-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

DeadlineSeconds: 120

image:
  repository: stripo/convo-core-chat-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: 
  - name: dockerhub

nameOverride: ""

fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

serviceMonitor:
  enabled: false

livenessProbe:
  initialDelaySeconds: 1
  periodSeconds: 10
  failureThreshold: 2

readinessProbe:
  initialDelaySeconds: 2
  periodSeconds: 10
  failureThreshold: 2

startupProbe:
  initialDelaySeconds: 9
  periodSeconds: 1
  failureThreshold: 180

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

httproute:
  enabled: false
  pathPrefix: /
  hostnames: []
  gateway:
    name: ngf-public
    namespace: nginx-gateway

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    memory: 1200Mi
    cpu: 1000m
  requests:
    memory: 300Mi
    cpu: 250m

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  - name: CONSOLE_LOG_AS_JSON
    value: "true"

configmap:
  enabled: true
  extraScrapeConfigs:
    base.properties: |
      STRIPO_WIDGET_PROMPT_ENDPOINT=http://ui-editor-widgets-registry-service:8080/api/v1/widgets/{widgetId}/prompt
      CONFIG_SERVICE_REQUIRED=false
      AUTH_PROVIDER_USE_MOCK=false
      AUTH_PROVIDER_HOST=http://convo-auth-service:8080/api
      USE_PERSISTED_STORE=true
      DATABASE_URL=postgresql://example:secret@postgres:5432/stripo_plugin_local_widgets_chat_history
      LANGFUSE_ENABLED=false
dumpCollectorEnable: false

pdb:
  enabled: false
