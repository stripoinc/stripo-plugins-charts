{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "stripo-url-validator-service.fullname" . }}-pdb
  labels:
    {{- include "stripo-url-validator-service.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "stripo-url-validator-service.selectorLabels" . | nindent 6 }}
{{- end }}